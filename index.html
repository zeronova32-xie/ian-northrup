<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lone Knight: Rage Edition</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #eee; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #2d3436; border: 4px solid #636e72; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; }
        h1 { margin: 0; color: #d63031; }
    </style>
</head>
<body>
    <div id="ui">
        <div>Health: <span id="hp">100</span>%</div>
        <div>Survival Time: <span id="timer">0</span>s</div>
    </div>
    <div id="msg">
        <h1 id="status">YOU DIED</h1>
        <p>Press 'R' to try again (if you dare)</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hpEl = document.getElementById('hp');
    const timerEl = document.getElementById('timer');
    const msg = document.getElementById('msg');

    canvas.width = 800;
    canvas.height = 600;

    let player = { x: 400, y: 300, size: 30, hp: 100, speed: 4 };
    let enemies = [];
    let bullets = []; // Enemy arrows
    let particles = [];
    let keys = {};
    let mouse = { x: 0, y: 0 };
    let frame = 0;
    let gameOver = false;
    let startTime = Date.now();

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    window.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });
    window.addEventListener('mousedown', attack);

    function spawnEnemy() {
        if (gameOver) return;
        const side = Math.floor(Math.random() * 4);
        let x, y;
        if (side === 0) { x = Math.random() * canvas.width; y = -30; }
        else if (side === 1) { x = Math.random() * canvas.width; y = canvas.height + 30; }
        else if (side === 2) { x = -30; y = Math.random() * canvas.height; }
        else { x = canvas.width + 30; y = Math.random() * canvas.height; }
        
        const type = Math.random() > 0.7 ? 'archer' : 'orc';
        enemies.push({ x, y, type, hp: type === 'orc' ? 2 : 1, speed: type === 'orc' ? 2.5 : 1.5 });
    }

    function attack() {
        if (gameOver) return;
        // Sword swing logic (circular hit area)
        const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
        const hitX = player.x + Math.cos(angle) * 40;
        const hitY = player.y + Math.sin(angle) * 40;

        // Visual slash
        particles.push({ x: hitX, y: hitY, life: 10, color: 'white', size: 15 });

        enemies.forEach((en, i) => {
            const dist = Math.hypot(en.x - hitX, en.y - hitY);
            if (dist < 50) {
                en.hp--;
                if (en.hp <= 0) {
                    enemies.splice(i, 1);
                    createExplosion(en.x, en.y, '#d63031');
                }
            }
        });
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<8; i++) particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color, size: 5 });
    }

    function update() {
        if (gameOver) {
            if (keys['r']) location.reload();
            return;
        }

        frame++;
        // Difficulty scaling
        if (frame % Math.max(10, 60 - Math.floor(frame/500)) === 0) spawnEnemy();

        // Player Movement
        if ((keys['w'] || keys['arrowup']) && player.y > 0) player.y -= player.speed;
        if ((keys['s'] || keys['arrowdown']) && player.y < canvas.height) player.y += player.speed;
        if ((keys['a'] || keys['arrowleft']) && player.x > 0) player.x -= player.speed;
        if ((keys['d'] || keys['arrowright']) && player.x < canvas.width) player.x += player.speed;

        // Enemies logic
        enemies.forEach((en, i) => {
            const angle = Math.atan2(player.y - en.y, player.x - en.x);
            en.x += Math.cos(angle) * en.speed;
            en.y += Math.sin(angle) * en.speed;

            // Archer shooting
            if (en.type === 'archer' && frame % 100 === 0) {
                bullets.push({ x: en.x, y: en.y, vx: Math.cos(angle) * 5, vy: Math.sin(angle) * 5 });
            }

            // Orc collision damage
            if (Math.hypot(player.x - en.x, player.y - en.y) < 25) {
                player.hp -= 0.5;
            }
        });

        // Bullets logic
        bullets.forEach((b, i) => {
            b.x += b.vx;
            b.y += b.vy;
            if (Math.hypot(player.x - b.x, player.y - b.y) < 20) {
                player.hp -= 10;
                bullets.splice(i, 1);
            }
        });

        if (player.hp <= 0) {
            player.hp = 0;
            gameOver = true;
            msg.style.display = 'block';
        }

        hpEl.innerText = Math.floor(player.hp);
        timerEl.innerText = Math.floor((Date.now() - startTime) / 1000);

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Player (Knight)
        ctx.font = '30px serif';
        ctx.textAlign = 'center';
        ctx.fillText('🏰', player.x, player.y + 10);

        // Draw Enemies
        enemies.forEach(en => {
            ctx.fillText(en.type === 'orc' ? '👹' : '🏹', en.x, en.y + 10);
        });

        // Draw Projectiles
        bullets.forEach(b => {
            ctx.fillStyle = '#fab1a0';
            ctx.beginPath();
            ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
            ctx.fill();
        });

        // Draw Particles
        particles.forEach((p, i) => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 20;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            p.x += p.vx || 0; p.y += p.vy || 0;
            p.life--;
            if (p.life <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;
    }

    update();
</script>
</body>
</html>
